name: AMSC_STFT CI/CD Pipeline

on: [push, pull_request]

jobs:
  # ─────────────────────────────────────────────────
  # TASK 1 + 2: Continuous Integration
  # Executes tests and builds the Singularity container image
  # ─────────────────────────────────────────────────
  ci:
    # Use Ubuntu 22.04 to ensure we have a modern GCC version (11+) for C++20
    runs-on: ubuntu-22.04

    steps:
      # Step 1: Downloads the repository code inside the Runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: [Setup] Install C++ HPC dependencies (CMake, OpenMP, OpenMPI)
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          cat requirements.txt | grep -v '^#' | xargs sudo apt-get install -y

      # Step 3: [Build] Configure and compile the C++ project
      - name: Build Project with CMake
        run: |
          cd ft_project
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      # Step 4: [Test] Execute the test suite using CTest
      - name: Run test suite with CTest
        run: |
          cd ft_project/build
          # OMPI_MCA_rmaps_base_oversubscribe=1 allows MPI to run more processes than physical cores
          export OMPI_MCA_rmaps_base_oversubscribe=1
          export OMP_NUM_THREADS=2
          ctest --output-on-failure

      # Step 5: [Apptainer] Install Apptainer to build the container
      - name: Install Apptainer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update -qq
          sudo apt-get install -y apptainer

      # Step 6: [Container] Build Singularity container image
      - name: Build Singularity container image
        run: sudo apptainer build --force amsc_stft.sif Singularity.def

      # Step 7: [Artifact] Save the built container to be downloaded later
      - name: Upload container artifact
        uses: actions/upload-artifact@v4
        with:
          name: amsc-stft-sif
          path: amsc_stft.sif
          retention-days: 7

  # ─────────────────────────────────────────────────
  # TASK 3 + 4: Continuous Deployment
  # Deploy on Galileo100 and submit the SLURM job
  # NOTE: This job depends on the successful completion of the 'ci' job, ensuring that deployment only occurs if tests pass and the container is built correctly.
  # ─────────────────────────────────────────────────
  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download container artifact
        uses: actions/download-artifact@v4
        with:
          name: amsc-stft-sif

      # Configures SSH access to the Galileo100 cluster using the provided secrets
      - name: Configure SSH access to Galileo100
        run: |
          mkdir -p ~/.ssh
          
          # Stores the private key in a neutral filename
          echo "${{ secrets.HPC_SSH_PRIVATE_KEY }}" > ~/.ssh/cineca_key
          chmod 600 ~/.ssh/cineca_key
          
          # Stores the SSH certificate
          echo "${{ secrets.HPC_CERT }}" > ~/.ssh/cineca_key-cert.pub
          chmod 644 ~/.ssh/cineca_key-cert.pub

      # Transfers necessary files (container, script, input data) to the Galileo100 cluster using scp
      - name: Deploy files to Galileo100 scratch
        env:
          REMOTE_USER: ${{ secrets.HPC_USERNAME }}
          REMOTE_PATH: ${{ secrets.HPC_SCRATCH_PATH }}
          SSH_OPTS: "-i ~/.ssh/cineca_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes"
        run: |
          REMOTE="${REMOTE_USER}@login.g100.cineca.it"

          # Creates the required folder structure on the cluster
          ssh $SSH_OPTS ${REMOTE} \
            "mkdir -p ${REMOTE_PATH}/input ${REMOTE_PATH}/results"

          # Copies the container, SLURM script, and input data
          scp $SSH_OPTS amsc_stft.sif  ${REMOTE}:${REMOTE_PATH}/
          scp $SSH_OPTS job.sh             ${REMOTE}:${REMOTE_PATH}/

      # Submits the SLURM job from the login node
      - name: Submit SLURM job via sbatch
        env:
          SSH_OPTS: "-i ~/.ssh/cineca_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes"
        run: |
          ssh $SSH_OPTS \
            ${{ secrets.HPC_USERNAME }}@login.g100.cineca.it \
            "cd ${{ secrets.HPC_SCRATCH_PATH }} && sbatch job.sh"