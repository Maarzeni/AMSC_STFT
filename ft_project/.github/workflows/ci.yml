name: C++ CI

# ==========================================
# 1. WHEN SHOULD THE CI RUN?
# ==========================================
# The workflow is triggered whenever:
#   - Code is pushed to the 'main' branch
#   - A pull request is opened targeting the 'main' branch
#
# This ensures continuous integration: every change is automatically
# tested before being merged.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ==========================================
# 2. JOBS: WHAT SHOULD BE DONE?
# ==========================================
jobs:
  build-and-test:
    # Run all steps on a fresh Ubuntu server provided by GitHub Actions
    runs-on: ubuntu-latest

    steps:

    # ──────────────────────────────────────────────────────────────────────
    # Step 1: Checkout the source code from the repository
    # ──────────────────────────────────────────────────────────────────────
    # Downloads all source files into the runner's workspace so we can
    # compile and test them.
    #
    - name: Checkout source code
      uses: actions/checkout@v4

    # ──────────────────────────────────────────────────────────────────────
    # Step 2: Install system dependencies
    # ──────────────────────────────────────────────────────────────────────
    # Ubuntu runners come with GCC and CMake pre-installed, but we need
    # to explicitly install OpenMP libraries (libomp-dev) since our project
    # uses OpenMP for parallelization (#pragma omp).
    #
    - name: Install dependencies (OpenMP, build-essential)
      run: sudo apt-get update && sudo apt-get install -y build-essential libomp-dev

    # ──────────────────────────────────────────────────────────────────────
    # Step 3: Configure the project with CMake
    # ──────────────────────────────────────────────────────────────────────
    # CMake reads CMakeLists.txt and generates build files (Makefiles).
    # The "-B build" flag specifies the output directory for build artifacts.
    # The "-S ." flag specifies the source directory (current directory).
    #
    - name: Configure CMake
      run: cmake -B build -S .

    # ──────────────────────────────────────────────────────────────────────
    # Step 4: Build the project
    # ──────────────────────────────────────────────────────────────────────
    # Compiles all source files and links them into libraries and executables.
    # The "-j 4" flag enables parallel compilation on 4 cores for faster builds.
    #
    - name: Build the project
      run: cmake --build build -j 4

    # ──────────────────────────────────────────────────────────────────────
    # Step 5: Run all tests
    # ──────────────────────────────────────────────────────────────────────
    # Executes all registered tests (from GoogleTest framework) using CTest.
    # "--output-on-failure" prints test output only if a test fails, making
    # it easier to debug failures.
    #
    # Tests that run:
    #   - WavReaderTest: Validates audio file reading
    #   - BaseFFTTest: C++20 concept validation
    #   - RecursiveFFTTest: Recursive FFT implementation
    #   - IterativeFFTTest: Iterative FFT implementation
    #   - ParallelFFTTest: Parallel FFT with OpenMP
    #   - BaseWindowTest: Window function base class
    #   - WindowConceptTest: C++20 window function concept
    #   - BlackmanWindow, HammingWindow, HannWindow tests: Individual window implementations
    #
    - name: Run tests with CTest
      run: ctest --test-dir build --output-on-failure